<!doctype html>
<html lang="en" class="h-full">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Sign in · MoRA Console</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{background:#fbfbfa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}</style>
</head>
<body class="min-h-full flex items-center justify-center p-6">
<div class="w-full max-w-sm">
  <div class="text-center mb-6">
    <div class="inline-flex items-center gap-2 font-semibold text-lg">
      <span class="inline-block w-3 h-3 rounded-full" style="background:#0f6e56"></span>MoRA Research Console</div>
    <p class="text-sm text-[#6b6b66] mt-1">Modality-Reliability Adaptation · authenticated</p>
  </div>
  <form method="post" action="/login" class="bg-white border border-[#e7e6e1] rounded-2xl p-6 space-y-4">
    {% if error %}<div class="text-sm text-[#a32d2d] bg-[#fcebeb] rounded-lg px-3 py-2">{{ error }}</div>{% endif %}
    <div>
      <label class="block text-sm font-medium mb-1">Username</label>
      <input name="username" autofocus autocomplete="username"
             class="w-full border border-[#dcdbd5] rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#0f6e56]/40" />
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Password</label>
      <input name="password" type="password" autocomplete="current-password"
             class="w-full border border-[#dcdbd5] rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#0f6e56]/40" />
    </div>
    <button class="w-full bg-[#0f6e56] text-white rounded-lg py-2.5 text-sm font-medium hover:bg-[#0c5b47]">
      Sign in</button>
  </form>
  <p class="text-center text-xs text-[#9a9a94] mt-4">Self-hosted. Bind to LAN / put behind HTTPS + a reverse proxy or VPN.</p>
</div>
</body>
</html>
